<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام رؤية باي | Roaya Pay PRO</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* تعريف المتغيرات للألوان (الوضع المضيء افتراضياً) */
        :root {
            --main-bg: #f0f2f5;
            --sidebar-bg: #ffffff;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --primary-gradient: linear-gradient(135deg, #1e3799 0%, #0984e3 100%);
            --accent-color: #ffa801;
            --sidebar-width: 280px;
        }

        /* --- إعدادات الوضع الليلي (Dark Mode) --- */
        body.dark-mode {
            --main-bg: #121212;
            --sidebar-bg: #1e1e1e;
            --text-color: #f1f2f6;
            --card-bg: #2d2d2d;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--main-bg); 
            color: var(--text-color); 
            transition: 0.3s ease; 
        }

        /* شاشة الدخول */
        #login-screen {
            position: fixed; inset: 0; 
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2029&auto=format&fit=crop') center/cover;
            z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 35px; padding: 40px;
            width: 90%; max-width: 400px; color: white; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        /* القائمة الجانبية */
        .sidebar {
            background: var(--sidebar-bg); width: var(--sidebar-width); height: 100vh; position: fixed; right: 0; top: 0;
            z-index: 1000; display: none; box-shadow: -5px 0 25px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .sidebar-brand { padding: 35px; font-weight: 900; font-size: 1.6rem; color: #1e3799; text-align: center; }
        .dark-mode .sidebar-brand { color: #0984e3; }
        
        .nav-link { padding: 12px 25px; margin: 5px 15px; border-radius: 12px; color: #636e72; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-link:hover, .nav-link.active { background: var(--primary-gradient); color: white !important; }
        .dark-mode .nav-link { color: #a4b0be; }

        /* زر التبديل بين الأبيض والأسود */
        .theme-switch {
            background: var(--accent-color);
            margin: 20px 15px; padding: 15px; border-radius: 15px;
            text-align: center; cursor: pointer; font-weight: bold; color: #000;
            box-shadow: 0 5px 15px rgba(255, 168, 1, 0.3);
        }

        /* المحتوى الرئيسي */
        main { margin-right: var(--sidebar-width); padding: 40px; display: none; }
        .custom-card { background: var(--card-bg); border-radius: 25px; padding: 30px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 992px) {
            .sidebar { width: 80px; }
            .sidebar-brand span, .nav-link span, .theme-switch span { display: none; }
            main { margin-right: 80px; }
        }
    </style>
</head>

<body>

    <div id="login-screen">
        <div class="login-card">
            <h2 class="fw-black mb-1">رؤية <span style="color: var(--accent-color);">باي</span></h2>
            <p class="opacity-75 mb-4">نظام الإدارة المتكامل</p>
            <input type="text" id="username" class="form-control mb-3 py-2 border-0 shadow-sm" placeholder="اسم المستخدم">
            <input type="password" id="password" class="form-control mb-4 py-2 border-0 shadow-sm" placeholder="كلمة المرور">
            <button class="btn btn-warning w-100 py-2 fw-bold shadow" onclick="handleLogin()">دخول النظام</button>
            <p id="error-msg" class="text-danger mt-3 d-none fw-bold">خطأ في البيانات!</p>
        </div>
    </div>

    <div class="sidebar shadow" id="main-sidebar">
        <div class="sidebar-brand">
            <i class="fa-solid fa-bolt-lightning"></i> <span>رؤية باي</span>
        </div>

        <div class="theme-switch" onclick="toggleDarkMode()">
            <i class="fas fa-moon" id="theme-icon"></i> <span id="theme-text">الوضع الليلي</span>
        </div>

        <div class="nav flex-column">
            <div onclick="showTab('home', this)" class="nav-link active">
                <i class="fas fa-chart-line"></i> <span>الإحصائيات</span>
            </div>
            <div onclick="showTab('pay-form', this)" class="nav-link">
                <i class="fas fa-plus-circle"></i> <span>إضافة معاملة</span>
            </div>
            <div onclick="showTab('history', this)" id="admin-link-1" class="nav-link">
                <i class="fas fa-history"></i> <span>سجل العمليات</span>
            </div>
            <div onclick="location.reload()" class="nav-link text-danger mt-auto mb-4">
                <i class="fas fa-power-off"></i> <span>خروج</span>
            </div>
        </div>
    </div>

    <main id="main-content">
        <div id="home" class="tab-content active">
            <h3 class="fw-bold mb-4">لوحة التحكم</h3>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="custom-card text-center" style="border-top: 5px solid #1e3799;">
                        <h6 class="text-muted">إجمالي المبالغ</h6>
                        <h1 class="fw-black" id="total-val">0 ج.م</h1>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="custom-card text-center" style="border-top: 5px solid #ffa801;">
                        <h6 class="text-muted">عدد العمليات</h6>
                        <h1 class="fw-black" id="total-count">0</h1>
                    </div>
                </div>
            </div>
        </div>

        <div id="pay-form" class="tab-content">
            <h3 class="fw-bold mb-4">تسجيل مبلغ جديد</h3>
            <div class="custom-card shadow-sm" style="max-width: 500px;">
                <input type="text" id="c-name" class="form-control mb-3 py-3 border-0 bg-light shadow-sm" placeholder="اسم العميل">
                <input type="number" id="c-amount" class="form-control mb-4 py-3 border-0 bg-light shadow-sm" placeholder="المبلغ بالجنية">
                <button class="btn btn-primary w-100 py-3 fw-bold rounded-4 shadow" onclick="processNow()">تأكيد العملية</button>
            </div>
        </div>

        <div id="history" class="tab-content">
            <div class="d-flex justify-content-between mb-4 align-items-center">
                <h3 class="fw-bold">الأرشيف</h3>
                <button class="btn btn-sm btn-outline-danger px-3 rounded-pill" onclick="clearData()">مسح السجل</button>
            </div>
            <div class="custom-card p-0 overflow-hidden">
                <table class="table table-hover mb-0">
                    <thead class="bg-primary text-white">
                        <tr>
                            <th class="p-3">الاسم</th>
                            <th>المبلغ</th>
                            <th>الوقت</th>
                        </tr>
                    </thead>
                    <tbody id="trx-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        // قاعدة البيانات المحلية
        let db = JSON.parse(localStorage.getItem('roaya_db')) || [];

        // تسجيل الدخول
        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            // يمكنك تغيير admin و 123 كما تحب
            if (u === "admin" && p === "123") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-sidebar').style.display = 'block';
                document.getElementById('main-content').style.display = 'block';
                refreshData();
            } else {
                document.getElementById('error-msg').classList.remove('d-none');
            }
        }

        // --- وظيفة التبديل الليلي (أسود/أبيض) ---
        function toggleDarkMode() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');

            body.classList.toggle('dark-mode');

            if (body.classList.contains('dark-mode')) {
                icon.className = 'fas fa-sun';
                text.innerText = 'الوضع المضيء';
                localStorage.setItem('theme', 'dark');
            } else {
                icon.className = 'fas fa-moon';
                text.innerText = 'الوضع الليلي';
                localStorage.setItem('theme', 'light');
            }
        }

        // إضافة معاملة
        function processNow() {
            const n = document.getElementById('c-name').value;
            const a = document.getElementById('c-amount').value;
            if(!n || !a) return alert("أكمل البيانات أولاً");

            db.push({ name: n, amount: parseFloat(a), time: new Date().toLocaleTimeString('ar-EG') });
            localStorage.setItem('roaya_db', JSON.stringify(db));
            
            document.getElementById('c-name').value = '';
            document.getElementById('c-amount').value = '';
            alert("✅ تم الحفظ بنجاح");
            refreshData();
        }

        // تحديث البيانات
        function refreshData() {
            const body = document.getElementById('trx-body');
            let total = 0;
            body.innerHTML = '';
            db.forEach(item => {
                total += item.amount;
                body.innerHTML += `<tr><td class="p-3 fw-bold">${item.name}</td><td class="text-primary fw-bold">${item.amount} ج.م</td><td class="small text-muted">${item.time}</td></tr>`;
            });
            document.getElementById('total-val').innerText = total.toLocaleString() + " ج.م";
            document.getElementById('total-count').innerText = db.length;
        }

        // التبديل بين الأقسام
        function showTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
        }

        function clearData() {
            if(confirm("هل تريد مسح السجل بالكامل؟")) {
                db = [];
                localStorage.removeItem('roaya_db');
                refreshData();
            }
        }

        // تذكر الوضع المختار عند فتح الصفحة
        window.onload = function() {
            if (localStorage.getItem('theme') === 'dark') toggleDarkMode();
        }
    </script>
</body>

</html>
