<!DOCTYPE html> 
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام رؤية باي | Roaya Pay</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --main-bg: #f0f2f5;
            --sidebar-bg: #ffffff;
            --text-color: #2d3436;
            --card-bg: #ffffff;
            --primary-gradient: linear-gradient(135deg, #1e3799 0%, #0984e3 100%);
            --accent-color: #ffa801;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        /* --- إعدادات الوضع الليلي --- */
        body.dark-mode {
            --main-bg: #121212;
            --sidebar-bg: #1e1e1e;
            --text-color: #f1f2f6;
            --card-bg: #2d2d2d;
        }

        body { font-family: 'Cairo', sans-serif; background: var(--main-bg); color: var(--text-color); transition: 0.3s; overflow-x: hidden; }

        /* Sidebar */
        .sidebar {
            background: var(--sidebar-bg); width: 280px; min-height: 100vh; position: fixed; right: 0; top: 0;
            z-index: 1000; display: none; box-shadow: -5px 0 20px rgba(0,0,0,0.03);
        }
        .sidebar-brand { padding: 40px 30px; font-weight: 900; font-size: 1.5rem; color: #1e3799; }
        .dark-mode .sidebar-brand { color: #0984e3; }

        .nav-link { padding: 15px 30px; margin: 5px 15px; border-radius: 15px; color: #636e72; font-weight: 600; transition: 0.4s; cursor: pointer; display: flex; align-items: center; }
        .nav-link:hover, .nav-link.active { background: var(--primary-gradient); color: white !important; box-shadow: 0 10px 20px rgba(9, 132, 227, 0.3); }
        .dark-mode .nav-link { color: #a4b0be; }

        /* زر التبديل الليلي */
        .dark-mode-toggle {
            background: var(--accent-color); color: #000;
            margin: 10px 25px; padding: 12px; border-radius: 12px;
            cursor: pointer; font-weight: bold; text-align: center;
            box-shadow: 0 4px 12px rgba(255, 168, 1, 0.2);
        }

        /* Main Content & Cards */
        main { margin-right: 280px; padding: 50px; display: none; }
        .card { background: var(--card-bg); color: var(--text-color); border: none; transition: 0.3s; }
        .premium-card { border-radius: 25px; padding: 35px; color: white; position: relative; overflow: hidden; height: 100%; }
        .card-blue { background: linear-gradient(135deg, #1e3799 0%, #0984e3 100%); }
        .card-orange { background: linear-gradient(135deg, #f0932b 0%, #ed4c67 100%); }
        .card-icon { position: absolute; left: -20px; bottom: -20px; font-size: 8rem; opacity: 0.15; }

        #login-screen {
            position: fixed; inset: 0; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2029&auto=format&fit=crop') center/cover;
            z-index: 9999; display: flex; align-items: center; justify-content: center;
        }

        .tab-content { display: none; animation: fadeIn 0.5s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 992px) {
            .sidebar { width: 80px; }
            .sidebar-brand span, .nav-link span, .dark-mode-toggle span { display: none; }
            main { margin-right: 80px; padding: 20px; }
        }
    </style>
</head>

<body>

    <div id="login-screen">
        <div class="card p-5 shadow-lg border-0 rounded-5 text-center" style="max-width: 450px; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);">
            <h1 class="fw-black mb-1 text-dark">ROAYA <span style="color: #ffa801;">PRO</span></h1>
            <p class="text-muted mb-4">نظام الإدارة والخدمات الذكي</p>
            <input type="text" id="username" class="form-control mb-3 py-2" placeholder="اسم المستخدم">
            <input type="password" id="password" class="form-control mb-4 py-2" placeholder="كلمة المرور">
            <button class="btn btn-warning w-100 py-3 fw-bold rounded-pill" onclick="handleLogin()">دخول النظام</button>
            <p id="error-msg" class="text-danger mt-3 d-none">بيانات الدخول غير صحيحة!</p>
        </div>
    </div>

    <div class="sidebar shadow" id="main-sidebar">
        <div class="sidebar-brand">رؤية باي <i class="fa-solid fa-globe"></i></div>
        
        <div class="dark-mode-toggle" onclick="toggleDarkMode()">
            <i class="fas fa-moon" id="theme-icon"></i> <span id="theme-text">الوضع الليلي</span>
        </div>

        <div class="nav flex-column">
            <a onclick="showTab('home', this)" class="nav-link active"><i class="fas fa-th-large ms-3"></i> <span>الإحصائيات</span></a>
            <a onclick="showTab('pay-form', this)" class="nav-link"><i class="fas fa-wallet ms-3"></i> <span>دفع جديد</span></a>
            <a onclick="showTab('history', this)" id="admin-link-1" class="nav-link"><i class="fas fa-list-ul ms-3"></i> <span>سجل العمليات</span></a>
            <a onclick="location.reload()" class="nav-link text-danger mt-5"><i class="fas fa-power-off ms-3"></i> <span>خروج</span></a>
        </div>
    </div>

    <main id="main-content">
        <div id="home" class="tab-content active">
            <div class="d-flex justify-content-between align-items-center mb-5">
                <h2 class="fw-bold">نظرة عامة</h2>
                <span id="role-badge" class="badge bg-primary px-4 py-2 rounded-pill"></span>
            </div>
            <div class="row g-4" id="admin-stats">
                <div class="col-md-6">
                    <div class="premium-card card-blue">
                        <i class="fas fa-chart-pie card-icon"></i>
                        <h5>إجمالي المبالغ</h5>
                        <h1 class="display-4 fw-bold" id="total-val">0 ج.م</h1>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="premium-card card-orange">
                        <i class="fas fa-fingerprint card-icon"></i>
                        <h5>المعاملات</h5>
                        <h1 class="display-4 fw-bold" id="total-count">0</h1>
                    </div>
                </div>
            </div>
        </div>

        <div id="pay-form" class="tab-content">
            <h2 class="fw-bold mb-4">تنفيذ معاملة</h2>
            <div class="card p-5 shadow-sm rounded-5" style="max-width: 500px;">
                <input type="text" id="c-name" class="form-control mb-3 py-2" placeholder="اسم العميل">
                <input type="number" id="c-amount" class="form-control mb-4 py-2" placeholder="المبلغ">
                <button class="btn btn-primary w-100 py-3 rounded-pill" onclick="processNow()">تأكيد العملية</button>
            </div>
        </div>

        <div id="history" class="tab-content">
            <div class="d-flex justify-content-between mb-4">
                <h3 class="fw-bold">السجل الضريبي</h3>
                <button class="btn btn-outline-danger btn-sm rounded-pill" onclick="clearData()">مسح السجل</button>
            </div>
            <div class="card shadow-sm rounded-4 overflow-hidden">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th class="p-3">#</th>
                            <th>العميل</th>
                            <th>القيمة</th>
                            <th>التاريخ</th>
                        </tr>
                    </thead>
                    <tbody id="trx-body"></tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        let db = JSON.parse(localStorage.getItem('roaya_pro_db')) || [];

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if (u === "admin" && p === "123") initUI(true);
            else if (u === "user" && p === "000") initUI(false);
            else document.getElementById('error-msg').classList.remove('d-none');
        }

        function initUI(isAdmin) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-sidebar').style.display = 'block';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('role-badge').innerText = isAdmin ? "إدارة كاملة" : "موظف";
            if (!isAdmin) {
                document.getElementById('admin-stats').classList.add('d-none');
                document.getElementById('admin-link-1').classList.add('d-none');
            }
            refreshData();
        }

        // --- وظيفة الوضع الليلي ---
        function toggleDarkMode() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');

            body.classList.toggle('dark-mode');

            if (body.classList.contains('dark-mode')) {
                icon.className = 'fas fa-sun';
                text.innerText = 'الوضع المضيء';
                localStorage.setItem('theme', 'dark');
            } else {
                icon.className = 'fas fa-moon';
                text.innerText = 'الوضع الليلي';
                localStorage.setItem('theme', 'light');
            }
        }

        function processNow() {
            const n = document.getElementById('c-name').value;
            const a = document.getElementById('c-amount').value;
            if(!n || !a) return alert("اكمل البيانات");
            db.push({ name: n, amount: parseFloat(a), date: new Date().toLocaleString('ar-EG') });
            localStorage.setItem('roaya_pro_db', JSON.stringify(db));
            alert("✅ تم الحفظ");
            document.getElementById('c-name').value = '';
            document.getElementById('c-amount').value = '';
            refreshData();
        }

        function refreshData() {
            const body = document.getElementById('trx-body');
            let total = 0;
            body.innerHTML = '';
            db.forEach((item, index) => {
                total += item.amount;
                body.innerHTML += `
                    <tr>
                        <td class="p-3 text-muted">#${index + 101}</td>
                        <td class="fw-bold">${item.name}</td>
                        <td class="text-primary">${item.amount.toLocaleString()} ج.م</td>
                        <td class="small text-muted">${item.date}</td>
                    </tr>`;
            });
            document.getElementById('total-val').innerText = total.toLocaleString() + " ج.م";
            document.getElementById('total-count').innerText = db.length;
        }

        function showTab(id, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(element) element.classList.add('active');
        }

        function clearData() {
            if(confirm("هل تريد مسح جميع السجلات؟")) {
                db = [];
                localStorage.removeItem('roaya_pro_db');
                refreshData();
            }
        }

        // تشغيل الوضع الليلي المحفوظ عند فتح الصفحة
        if(localStorage.getItem('theme') === 'dark') toggleDarkMode();
    </script>
</body>
</html>
